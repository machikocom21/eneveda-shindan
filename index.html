<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えねヴェーダ診断</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{padding:2rem 0;max-width:560px;margin:0 auto;font-family:sans-serif;}
.hd{text-align:center;margin-bottom:2rem;}
.ey{font-size:11px;letter-spacing:.12em;color:#888;text-transform:uppercase;display:block;margin-bottom:.6rem;}
.hd h1{font-size:24px;font-weight:500;color:#1a1a1a;}
.hd p{font-size:14px;color:#666;margin-top:.4rem;line-height:1.6;}
.pb{height:3px;background:#e5e5e5;border-radius:2px;margin-bottom:1.75rem;overflow:hidden;}
.pf{height:100%;background:#B8860B;border-radius:2px;transition:width .35s;}
.qc{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.4rem;margin-bottom:1rem;}
.ql{font-size:11px;color:#888;letter-spacing:.08em;display:block;margin-bottom:.4rem;}
.qt{font-size:16px;font-weight:500;color:#1a1a1a;line-height:1.5;margin-bottom:1.1rem;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{background:#f9f9f9;border:0.5px solid #ddd;border-radius:8px;padding:.8rem .95rem;font-size:13px;color:#1a1a1a;cursor:pointer;text-align:left;line-height:1.5;width:100%;font-family:sans-serif;transition:border-color .15s;}
.opt.on{border-color:#B8860B;color:#B8860B;font-weight:500;}
.hint{font-size:11px;color:#888;margin-bottom:.7rem;}
.chk-list{display:flex;flex-direction:column;gap:8px;}
.chk-item{display:flex;align-items:flex-start;gap:10px;padding:.75rem .95rem;background:#f9f9f9;border:0.5px solid #ddd;border-radius:8px;cursor:pointer;transition:border-color .15s;}
.chk-item.on{border-color:#B8860B;}
.chk-item input[type=checkbox]{width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:#B8860B;cursor:pointer;}
.chk-item span{font-size:13px;color:#1a1a1a;line-height:1.5;}
.chk-item.on span{color:#B8860B;font-weight:500;}
.ftxt{width:100%;background:#f9f9f9;border:0.5px solid #ddd;border-radius:8px;padding:.8rem .95rem;font-size:13px;color:#1a1a1a;resize:vertical;min-height:85px;font-family:sans-serif;line-height:1.6;}
.ftxt:focus{outline:none;border-color:#B8860B;}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;}
.bbk{background:none;border:0.5px solid #ddd;border-radius:8px;padding:.55rem 1.1rem;font-size:13px;color:#888;cursor:pointer;font-family:sans-serif;}
.bnx{background:#B8860B;border:none;border-radius:8px;padding:.55rem 1.4rem;font-size:13px;color:#fff;cursor:pointer;font-weight:500;font-family:sans-serif;opacity:.35;pointer-events:none;}
.bnx.ok{opacity:1;pointer-events:auto;}
.cnt{font-size:12px;color:#888;}
.inp{width:100%;background:#f9f9f9;border:0.5px solid #ddd;border-radius:8px;padding:.8rem .95rem;font-size:13px;color:#1a1a1a;margin-bottom:.75rem;font-family:sans-serif;}
.inp:focus{outline:none;border-color:#B8860B;}
.start-btn{width:100%;background:#B8860B;border:none;border-radius:8px;padding:.75rem;font-size:14px;color:#fff;cursor:pointer;font-weight:500;font-family:sans-serif;}
.spinner{width:28px;height:28px;border:2px solid #eee;border-top-color:#B8860B;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto .9rem;}
@keyframes sp{to{transform:rotate(360deg);}}
.ldg{text-align:center;padding:3rem 1rem;}
.ldg p{color:#888;font-size:14px;}
.rc{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.6rem;margin-bottom:1rem;}
.bdg{display:inline-block;font-size:11px;letter-spacing:.1em;padding:3px 10px;border-radius:20px;background:#f9f9f9;color:#B8860B;border:0.5px solid #B8860B;margin-bottom:.9rem;}
.rt{font-size:21px;font-weight:500;color:#1a1a1a;margin-bottom:.9rem;}
.rb p{font-size:14px;color:#555;line-height:1.9;margin-bottom:.9em;}
.cta{border:0.5px solid #B8860B;border-radius:12px;padding:1.4rem;text-align:center;margin-top:.75rem;}
.cta p{font-size:14px;color:#555;margin-bottom:.9rem;line-height:1.7;}
.ctab{background:#B8860B;color:#fff;border-radius:8px;padding:.65rem 1.8rem;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:sans-serif;}
.errc{background:#f9f9f9;border:0.5px solid #ddd;border-radius:12px;padding:1.4rem;}
.errc p{color:#666;font-size:13px;line-height:1.7;margin-bottom:.5rem;}
.errc pre{font-size:11px;color:#999;background:#fff;padding:.5rem;border-radius:4px;overflow:auto;margin-bottom:.9rem;white-space:pre-wrap;word-break:break-all;}
.rty{background:none;border:0.5px solid #ccc;border-radius:8px;padding:.55rem 1.1rem;font-size:13px;color:#333;cursor:pointer;font-family:sans-serif;}
</style>
</head>
<body>

<div id="intro" class="wrap">
  <div class="hd">
    <span class="ey">Ene-Veda Diagnosis</span>
    <h1>えねヴェーダ診断</h1>
    <p>10の質問に答えて、あなたのエネルギータイプを知ろう</p>
  </div>
  <div class="qc">
    <p style="font-size:13px;color:#888;margin-bottom:1rem;">診断結果をメールでお届けします</p>
    <input id="inp-name" class="inp" type="text" placeholder="お名前">
    <input id="inp-email" class="inp" type="email" placeholder="メールアドレス">
    <button class="start-btn" id="btn-start">診断をはじめる →</button>
  </div>
</div>

<div id="app" class="wrap" style="display:none;">
  <div class="hd">
    <span class="ey">Ene-Veda Diagnosis</span>
    <h1>えねヴェーダ診断</h1>
    <p>10の質問に答えて、あなたのエネルギータイプを知ろう</p>
  </div>
  <div class="pb"><div class="pf" id="pf" style="width:10%"></div></div>
  <div id="qa"></div>
  <div class="nav">
    <button class="bbk" id="bbk">← もどる</button>
    <span class="cnt" id="cnt">1 / 10</span>
    <button class="bnx" id="bnx">つぎへ →</button>
  </div>
</div>

<div id="res" class="wrap" style="display:none;">
  <div class="ldg" id="ldg"><div class="spinner"></div><p>あなたのエネルギーを読み取っています…</p></div>
  <div id="rout"></div>
</div>

<script>
var userName='', userEmail='';

document.getElementById('btn-start').addEventListener('click', function(){
  var n = document.getElementById('inp-name').value.trim();
  var e = document.getElementById('inp-email').value.trim();
  if(!n || !e){ alert('お名前とメールアドレスを入力してください'); return; }
  userName = n;
  userEmail = e;
  document.getElementById('intro').style.display = 'none';
  document.getElementById('app').style.display = 'block';
});

var QS=[
  {id:'q1',lbl:'Q1 — 身体の傾向',type:'s',txt:'あなたの体型・肌のイメージに近いのは？',opts:[{t:'引き締まっていてスタイルがいい。肌に艶があるほう',k:'火'},{t:'すらっとして細身。乾燥しやすかったり冷えやすい',k:'風'},{t:'丸みがあってグラマー。肌がなめらかでしっとりしてる',k:'水土'}]},
  {id:'q2',lbl:'Q2 — 得意なこと',type:'s',txt:'人からよく頼られたり、褒められることは？',opts:[{t:'判断が早い、結果を出す、場をまとめるリーダーシップ',k:'火'},{t:'アイデアが豊富、場を盛り上げる、表現する・伝える力',k:'風'},{t:'話を聞く、安心感を与える、コツコツ続ける・育てる',k:'水土'}]},
  {id:'q3',lbl:'Q3 — お金との関係',type:'s',txt:'お金に対して自然とやってしまうことは？',opts:[{t:'価値あるものには惜しまず使う。高品質・高単価を選びがち',k:'火'},{t:'気分で使っちゃう。好奇心や感覚優先で動く',k:'風'},{t:'貯めることが安心。急な変化より安定を選ぶ',k:'水土'}]},
  {id:'q4',lbl:'Q4 — ストレスの出方',type:'s',txt:'しんどい時に身体や心に出やすいのは？',opts:[{t:'肌荒れ・ニキビ・イライラ・胃腸の不調・批判的になる',k:'火'},{t:'冷え・肩こり・不眠・頭がぐるぐる・不安になる',k:'風'},{t:'むくみ・だるさ・やる気が出ない・執着しやすくなる',k:'水土'}]},
  {id:'q5',lbl:'Q5 — 行動パターン',type:'s',txt:'何か新しいことを始める時のクセは？',opts:[{t:'目標を決めて最短ルートで動く。計画的に結果を取りにいく',k:'火'},{t:'とりあえずやってみる。直感や気分で動き始める',k:'風'},{t:'じっくり情報を集めてから慎重に動く。準備が整ってから',k:'水土'}]},
  {id:'q6',lbl:'Q6 — 人間関係のスタイル',type:'s',txt:'人と関わる時、自然とやってしまうことは？',opts:[{t:'場をまとめる・リードする。率直に意見を言う',k:'火'},{t:'場を楽しくする・いろんな人と繋がる・話すのが好き',k:'風'},{t:'相手の話を聞く・サポートする・長く深く付き合う',k:'水土'}]},
  {id:'q7',lbl:'Q7 — 回復のスタイル',type:'s',txt:'疲れた時、自然とやっていることは？',opts:[{t:'質のいいホテルや食事でリセット。自分にご褒美する',k:'火'},{t:'旅行・おでかけ・新しい刺激で気分転換する',k:'風'},{t:'家でゆっくり。同じルーティンの中で整える',k:'水土'}]},
  {id:'q8',lbl:'Q8 — 今のしんどさ（複数選択OK）',type:'m',txt:'今、自分に当てはまると感じるものを選んでください',opts:[{t:'頑張っているのに結果が見えない'},{t:'やりたいことが多すぎて散漫になっている'},{t:'与えてばかりで自分が空っぽになってきた'},{t:'変化したいのに動けない・現状に縛られてる感じ'},{t:'感情に振り回されて落ち着く場所が見つからない'}]},
  {id:'q9',lbl:'Q9 — 今のエネルギー',type:'s',txt:'今の自分を色で例えると？（直感で選んでね）',opts:[{t:'赤・オレンジ系 — 熱い、燃えてる、でも燃えすぎかも',k:'火過多'},{t:'水色・白系 — 軽い、ふわふわ、でも不安定かも',k:'風過多'},{t:'緑・茶系 — 落ち着いてる、でも重い・停滞感がある',k:'水土過多'},{t:'グレー・くすみ系 — よくわからない、全部混ざってる感じ',k:'バランス崩れ'}]},
  {id:'q10',lbl:'Q10 — 本当はどうなりたい？',type:'f',txt:'今の自分に一番足りてないと感じること、または本当は手放したいことを自由に書いてください'}
];

var cur=0,ans={};

function renderQ(){
  var q=QS[cur];
  document.getElementById('pf').style.width=Math.round((cur+1)/QS.length*100)+'%';
  document.getElementById('cnt').textContent=(cur+1)+' / '+QS.length;
  document.getElementById('bbk').style.visibility=cur===0?'hidden':'visible';
  document.getElementById('bnx').textContent=cur===QS.length-1?'診断する ✦':'つぎへ →';
  var h='<div class="qc"><span class="ql">'+q.lbl+'</span><p class="qt">'+q.txt+'</p>';
  if(q.type==='s'){
    h+='<div class="opts" id="sopts">';
    q.opts.forEach(function(o,i){h+='<button class="opt'+(ans[q.id]===i?' on':'')+'" data-i="'+i+'">'+o.t+'</button>';});
    h+='</div>';
  }else if(q.type==='m'){
    h+='<p class="hint">複数選択できます（なければそのまま「つぎへ」でOK）</p><div class="chk-list" id="mopts">';
    var sel=ans[q.id]||[];
    q.opts.forEach(function(o,i){
      var chk=sel.indexOf(i)>-1;
      h+='<label class="chk-item'+(chk?' on':'')+'" data-mi="'+i+'"><input type="checkbox" data-ci="'+i+'"'+(chk?' checked':'')+'>'+
         '<span>'+o.t+'</span></label>';
    });
    h+='</div>';
  }else{
    h+='<textarea class="ftxt" id="ftxt" placeholder="思ったままに書いてみてください…">'+(ans[q.id]||'')+'</textarea>';
  }
  h+='</div>';
  document.getElementById('qa').innerHTML=h;
  if(q.type==='s'){
    document.querySelectorAll('#sopts .opt').forEach(function(btn){
      btn.addEventListener('click',function(){
        var i=parseInt(this.getAttribute('data-i'));
        ans[q.id]=i;
        document.querySelectorAll('#sopts .opt').forEach(function(b){b.className='opt'+(parseInt(b.getAttribute('data-i'))===i?' on':'');});
        updateBtn();
      });
    });
  }else if(q.type==='m'){
    document.querySelectorAll('#mopts input[type=checkbox]').forEach(function(cb){
      cb.addEventListener('change',function(){
        var i=parseInt(this.getAttribute('data-ci'));
        if(!ans[q.id])ans[q.id]=[];
        var idx=ans[q.id].indexOf(i);
        if(this.checked){if(idx===-1)ans[q.id].push(i);}else{if(idx>-1)ans[q.id].splice(idx,1);}
        document.querySelectorAll('#mopts .chk-item').forEach(function(lbl){
          var mi=parseInt(lbl.getAttribute('data-mi'));
          lbl.className='chk-item'+(ans[q.id].indexOf(mi)>-1?' on':'');
        });
        updateBtn();
      });
    });
  }else{
    var ftxt=document.getElementById('ftxt');
    if(ftxt)ftxt.addEventListener('input',function(){ans[q.id]=this.value;updateBtn();});
  }
  updateBtn();
}

function updateBtn(){
  var q=QS[cur],ok=false;
  if(q.type==='s')ok=ans[q.id]!==undefined;
  else if(q.type==='m')ok=true;
  else ok=(ans[q.id]||'').trim().length>0;
  document.getElementById('bnx').className='bnx'+(ok?' ok':'');
}

function goNext(){
  var q=QS[cur];
  if(q.type==='s'&&ans[q.id]===undefined)return;
  if(q.type==='f'&&!(ans[q.id]||'').trim())return;
  if(cur<QS.length-1){cur++;renderQ();}else{diagnose();}
}

document.getElementById('bnx').addEventListener('click',goNext);
document.getElementById('bbk').addEventListener('click',function(){if(cur>0){cur--;renderQ();}});

function diagnose(){
  document.getElementById('app').style.display='none';
  document.getElementById('res').style.display='block';
  var sc={'火':0,'風':0,'水土':0};
  for(var i=0;i<7;i++){var q=QS[i],a=ans[q.id];if(a!==undefined&&q.opts[a]&&sc[q.opts[a].k]!==undefined)sc[q.opts[a].k]++;}
  var sorted=Object.entries(sc).sort(function(a,b){return b[1]-a[1];});
  var main=sorted[0][0];
  var sub=sorted[1][1]>=2?sorted[1][0]:null;
  var shindosa=(ans['q8']||[]).map(function(i){return QS[7].opts[i].t;}).join('、')||'特になし';
  var colorText=ans['q9']!==undefined?QS[8].opts[ans['q9']].t:'未回答';
  var free=ans['q10']||'未記入';
  var prompt='あなたはヘブンリーまち子のえねヴェーダ診断AIです。アーユルヴェーダのエネルギー（火・風・水土）をベースに、その人の今の状態とコーチングの入口として機能する診断結果文を生成してください。\n\n【トーンのルール】\n- 押しつけがましくない、媚びない、でも温かい\n- 体験ベース・感覚的な言葉。エネルギーの言葉は自然に使う\n- ごく自然に関西弁がちらり\n- 売り込み感ゼロ。内省を促す締め\n\n【構成】\n1. タイプ名と一言でその性質\n2. 今のあなたの状態を本人の回答を踏まえて言語化\n3. エネルギー的に見た詰まっているポイントのヒント\n4. 個別セッションへの自然な導線\n\n全体400〜500字。段落ごとに空行。\n\n【スコア】火:'+sc['火']+'点 / 風:'+sc['風']+'点 / 水土:'+sc['水土']+'点\n【メインタイプ】'+main+'タイプ\n【サブタイプ】'+(sub?sub+'タイプ':'なし')+'\n【今のしんどさ】'+shindosa+'\n【エネルギー感】'+colorText+'\n【本人の言葉】'+free;
  fetch('/api/diagnose',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt:prompt,name:userName,email:userEmail})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error)throw new Error(data.error);
    var text=data.text;
    var subLabel=sub?' × '+sub:'';
    var paras=text.split(/\n\n+/).map(function(p){return '<p>'+p.replace(/\n/g,'<br>')+'</p>';}).join('');
    document.getElementById('ldg').style.display='none';
    document.getElementById('rout').innerHTML=
      '<div class="rc"><span class="bdg">えねヴェーダ診断 結果</span><p class="rt">'+main+'タイプ'+subLabel+'</p><div class="rb">'+paras+'</div></div>'+
      '<div class="cta"><p>この診断結果、もっと深く話してみたくなった方へ。<br>ヘブンリーまち子の個別セッション（無料）では、あなたのエネルギータイプと今の詰まりを一緒にほぐしていきます。</p>'+
      '<button class="ctab" id="ctab">個別セッションを申し込む ↗</button></div>';
    document.getElementById('ctab').addEventListener('click',function(){
      window.open('https://lin.ee/qOAtgQE','_blank');
    });
  })
  .catch(function(e){
    document.getElementById('ldg').style.display='none';
    document.getElementById('rout').innerHTML=
      '<div class="errc"><p>診断結果の生成中にエラーが発生しました。</p>'+
      '<pre>'+e.message+'</pre>'+
      '<button class="rty" id="rty">最初からやり直す</button></div>';
    document.getElementById('rty').addEventListener('click',function(){location.reload();});
  });
}

renderQ();
</script>
</body>
</html>
